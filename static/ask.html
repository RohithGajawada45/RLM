<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Document Concierge - Ask</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script defer="" src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/static/theme.js"></script>
<link href="/static/theme.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col relative">
<!-- TopNavBar -->
<nav class="bg-background/95 fixed top-0 w-full z-50 border-b border-glass-border">
<div class="flex items-end justify-between px-page-margin h-16 max-w-container-max mx-auto">
<div class="font-headline-lg text-headline-lg font-semibold tracking-tight text-on-background pb-3">
                Document Concierge
            </div>
<div class="hidden md:flex items-end gap-1 -mb-px">
<a class="folder-tab px-4 py-2.5 font-body-lg text-[14px] text-text-muted hover:text-primary transition-colors" href="/static/index.html">Library</a>
<a class="folder-tab active px-4 py-2.5 font-headline-md text-[15px] font-semibold text-on-surface border-l border-r border-t border-glass-border" href="/static/ask.html">Ask</a>
<a class="folder-tab px-4 py-2.5 font-body-lg text-[14px] text-text-muted hover:text-primary transition-colors" href="/static/cache.html">Cache</a>
<a class="folder-tab px-4 py-2.5 font-body-lg text-[14px] text-text-muted hover:text-primary transition-colors" href="/static/settings.html">Setup</a>
</div>
<div class="flex items-center gap-gap-md text-text-muted font-body-lg text-body-lg pb-3">
<button class="hover:text-primary transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<a class="hover:text-primary transition-colors p-2 rounded-full active:scale-95 duration-200" href="/static/settings.html">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
<div class="w-7 h-7 rounded-full bg-primary/15 border border-primary/30 ml-1"></div>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-container-max mx-auto px-page-margin pt-24 pb-32 flex flex-col gap-5">
<!-- Query Input Block -->
<section class="glass-panel rounded p-7 flex flex-col gap-4">
<h1 class="font-headline-lg text-headline-lg text-on-surface">New Inquiry</h1>
<div class="relative">
<textarea class="w-full bg-cream border border-glass-border rounded p-4 font-body-lg text-body-lg text-on-surface placeholder:text-text-muted focus:border-primary focus:ring-4 focus:ring-accent-glow focus:outline-none transition-all resize-none" id="query-input" placeholder="Ask about your documents…" rows="4"></textarea>
<div class="absolute bottom-4 right-4 flex items-center gap-3">
<span class="font-data-num text-data-num text-text-muted">Cmd+Enter</span>
<button class="bg-primary text-on-primary font-headline-md text-headline-md px-6 py-2 rounded shadow-sm hover:bg-primary-container active:scale-95 transition-all disabled:opacity-50" id="ask-btn">
                        Ask
                    </button>
</div>
</div>
<!-- Active State Loading Strip (hidden until a query is running) -->
<div class="hidden items-center gap-3 p-3 bg-surface-container-low rounded border border-glass-border mt-2" id="status-bar">
<div class="relative w-3 h-3 flex items-center justify-center ml-1">
<div class="absolute w-full h-full bg-primary rounded-full opacity-50 ripple-pulse"></div>
<div class="w-2 h-2 bg-primary rounded-full z-10"></div>
</div>
<span class="font-data-num text-data-num text-primary" id="status-text">Routing…</span>
</div>
</section>
<!-- Turn History (populated live by app.js) -->
<section class="flex flex-col gap-5 mt-4" id="turn-history">
<div class="text-center py-10 opacity-60 font-body-sm text-body-sm text-text-muted" id="turn-history-empty">
                Ask your first question above.
            </div>
</section>
</main>
<!-- Footer -->
<footer class="bg-surface-container-lowest w-full py-8 mt-auto border-t border-glass-border">
<div class="flex flex-col md:flex-row justify-between items-center gap-gap-md px-page-margin max-w-container-max mx-auto">
<div class="font-label-mono-bold text-label-mono-bold text-primary">
                © 2024 Document Concierge · System v2.4.1-alpha
            </div>
<div class="flex flex-wrap justify-center gap-gap-md font-body-sm text-body-sm text-text-muted">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">API Documentation</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
<script src="/static/app.js"></script>
</body></html>
