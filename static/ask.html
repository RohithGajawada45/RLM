<style>
        .aurora-bg {
            background: linear-gradient(135deg, rgba(252, 248, 255, 0.8) 0%, rgba(247, 243, 240, 0.9) 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .aurora-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(99, 82, 240, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(6, 182, 212, 0.03) 0%, transparent 40%);
            animation: aurora-shift 20s infinite linear;
        }
        @keyframes aurora-shift {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background-color: rgba(252, 248, 255, 0.6);
            backdrop-filter: blur(16px) saturate(1.4);
            border: 1px solid var(--tw-colors-glass-border);
            box-shadow: 0 4px 6px -1px var(--tw-colors-accent-glow), 0 2px 4px -1px var(--tw-colors-accent-glow);
        }
        .glass-panel:hover {
            backdrop-filter: blur(20px) saturate(1.5);
            box-shadow: 0 10px 15px -3px var(--tw-colors-accent-glow), 0 4px 6px -2px var(--tw-colors-accent-glow);
            transform: translateY(-1px);
            transition: all 0.3s ease;
        }
        .ripple-pulse {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        .token-bar-fill {
            transform-origin: left;
            animation: scale-x-in 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes scale-x-in {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
